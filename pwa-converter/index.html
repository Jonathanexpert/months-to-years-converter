<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- ── Primary Meta ── -->
  <title>Months to Years Converter</title>
  <meta name="description" content="Convert months into years, decades, weeks and days instantly. Works offline." />
  <meta name="keywords" content="months to years, time converter, month year calculator" />
  <meta name="author" content="MTY Converter" />
  <meta name="robots" content="index, follow" />

  <!-- ── PWA / Theme ── -->
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MonthsToYears" />
  <meta name="msapplication-TileColor" content="#1a1a2e" />
  <meta name="msapplication-TileImage" content="icons/icon-144x144.png" />

  <!-- ── PWA Manifest ── -->
  <link rel="manifest" href="manifest.json" />

  <!-- ── Apple Touch Icons ── -->
  <link rel="apple-touch-icon" href="icons/icon-180x180.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144x144.png" />
  <link rel="apple-touch-icon" sizes="128x128" href="icons/icon-128x128.png" />

  <!-- ── Favicon ── -->
  <link rel="icon" type="image/png" sizes="96x96"  href="icons/icon-96x96.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png" />

  <!-- ── Google Fonts ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─────────────────────────────────────────────
       CSS Custom Properties
    ───────────────────────────────────────────── */
    :root {
      --bg:          #1a1a2e;
      --surface:     #16213e;
      --surface-2:   #0f3460;
      --accent:      #ffb347;
      --accent-dim:  rgba(255,179,71,0.15);
      --accent-glow: rgba(255,179,71,0.35);
      --text:        #f0e6d3;
      --text-muted:  #8a8fa8;
      --success:     #6fcf97;
      --divider:     rgba(255,255,255,0.07);
      --radius:      20px;
      --radius-sm:   12px;
      --shadow:      0 24px 64px rgba(0,0,0,0.5);
      --transition:  0.25s cubic-bezier(0.4,0,0.2,1);
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-mono:    'DM Mono', 'Courier New', monospace;
      --font-body:    'DM Sans', sans-serif;
    }

    /* ─────────────────────────────────────────────
       Reset & Base
    ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100%;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      /* Subtle radial bg texture */
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(15,52,96,0.8) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(255,179,71,0.06) 0%, transparent 60%);
    }

    /* ─────────────────────────────────────────────
       Card
    ───────────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--divider);
      border-radius: var(--radius);
      padding: 36px 28px 32px;
      box-shadow: var(--shadow);
      animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }

    /* ─────────────────────────────────────────────
       Header
    ───────────────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header-icon {
      width: 56px;
      height: 56px;
      background: var(--accent-dim);
      border: 1.5px solid var(--accent);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .header-icon svg {
      width: 26px;
      height: 26px;
    }

    .header h1 {
      font-family: var(--font-display);
      font-size: 1.7rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.2;
    }

    .header h1 span {
      color: var(--accent);
    }

    .header p {
      margin-top: 6px;
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.03em;
    }

    /* ─────────────────────────────────────────────
       Input Group
    ───────────────────────────────────────────── */
    .input-group {
      margin-bottom: 24px;
    }

    .input-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap input[type="number"] {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--divider);
      border-radius: var(--radius-sm);
      padding: 16px 70px 16px 20px;
      font-family: var(--font-mono);
      font-size: 1.6rem;
      font-weight: 500;
      color: var(--text);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .input-wrap input[type="number"]::-webkit-outer-spin-button,
    .input-wrap input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    .input-wrap input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .input-unit {
      position: absolute;
      right: 16px;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      pointer-events: none;
    }

    /* Stepper buttons */
    .stepper {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .stepper button {
      flex: 1;
      padding: 8px 0;
      background: var(--accent-dim);
      border: 1px solid rgba(255,179,71,0.2);
      border-radius: var(--radius-sm);
      color: var(--accent);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
    }

    .stepper button:hover  { background: rgba(255,179,71,0.22); }
    .stepper button:active { transform: scale(0.97); }

    /* ─────────────────────────────────────────────
       Convert Button
    ───────────────────────────────────────────── */
    .btn-convert {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #1a1a2e;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 4px 20px rgba(255,179,71,0.3);
      margin-bottom: 28px;
    }

    .btn-convert:hover  { background: #ffc564; box-shadow: 0 6px 28px rgba(255,179,71,0.45); }
    .btn-convert:active { transform: scale(0.98); }

    /* ─────────────────────────────────────────────
       Results Grid
    ───────────────────────────────────────────── */
    .results {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
    }

    .results.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .result-card {
      background: var(--bg);
      border: 1px solid var(--divider);
      border-radius: var(--radius-sm);
      padding: 16px 14px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: border-color var(--transition), transform var(--transition);
    }

    .result-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-dim);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .result-card:hover { border-color: rgba(255,179,71,0.3); transform: translateY(-2px); }
    .result-card:hover::before { opacity: 1; }

    .result-card.primary {
      grid-column: 1 / -1;
      border-color: rgba(255,179,71,0.25);
      background: linear-gradient(135deg, rgba(255,179,71,0.08) 0%, rgba(255,179,71,0.02) 100%);
    }

    .result-card.primary .result-value {
      font-size: 2.6rem;
      color: var(--accent);
    }

    .result-value {
      font-family: var(--font-mono);
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
      margin-bottom: 6px;
      position: relative;
    }

    .result-value .decimal {
      font-size: 0.65em;
      opacity: 0.7;
    }

    .result-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      position: relative;
    }

    /* ─────────────────────────────────────────────
       Breakdown Section
    ───────────────────────────────────────────── */
    .breakdown {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--divider);
      opacity: 0;
      transition: opacity 0.4s ease 0.15s;
    }

    .breakdown.visible { opacity: 1; }

    .breakdown-title {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .breakdown-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--divider);
    }

    .breakdown-row:last-child { border-bottom: none; }

    .breakdown-key {
      font-size: 0.83rem;
      color: var(--text-muted);
    }

    .breakdown-val {
      font-family: var(--font-mono);
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
    }

    /* ─────────────────────────────────────────────
       Reset Link
    ───────────────────────────────────────────── */
    .reset-wrap {
      text-align: center;
      margin-top: 22px;
      opacity: 0;
      transition: opacity 0.4s ease 0.2s;
    }

    .reset-wrap.visible { opacity: 1; }

    .btn-reset {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.78rem;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color var(--transition);
    }

    .btn-reset:hover { color: var(--text); }

    /* ─────────────────────────────────────────────
       Offline Banner
    ───────────────────────────────────────────── */
    .offline-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 10px 16px;
      background: #2d2d2d;
      color: #f0c060;
      text-align: center;
      font-size: 0.78rem;
      font-weight: 500;
      z-index: 100;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
    }

    .offline-banner.show { transform: translateY(0); }

    /* ─────────────────────────────────────────────
       Install Prompt
    ───────────────────────────────────────────── */
    .install-banner {
      position: fixed;
      bottom: max(16px, env(safe-area-inset-bottom));
      left: 16px;
      right: 16px;
      max-width: 420px;
      margin: 0 auto;
      background: var(--surface-2);
      border: 1px solid rgba(255,179,71,0.2);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 99;
      transform: translateY(calc(100% + 32px));
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    .install-banner.show { transform: translateY(0); }

    .install-banner p {
      flex: 1;
      font-size: 0.8rem;
      color: var(--text);
      line-height: 1.4;
    }

    .install-banner p strong { color: var(--accent); }

    .install-banner-btns { display: flex; gap: 8px; }

    .btn-install {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      color: #1a1a2e;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-dismiss {
      background: none;
      border: 1px solid var(--divider);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.78rem;
      cursor: pointer;
    }

    /* ─────────────────────────────────────────────
       Responsive tweaks
    ───────────────────────────────────────────── */
    @media (max-width: 380px) {
      .card { padding: 28px 20px 24px; }
      .header h1 { font-size: 1.45rem; }
      .result-card.primary .result-value { font-size: 2.1rem; }
    }

    @media (min-height: 700px) {
      body { justify-content: center; }
    }
  </style>
</head>
<body>

  <!-- Offline Banner -->
  <div class="offline-banner" id="offlineBanner" role="status" aria-live="polite">
    📶 You are offline — the app still works fully.
  </div>

  <!-- Main Card -->
  <main class="card" role="main">

    <!-- Header -->
    <header class="header">
      <div class="header-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ffb347" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8"  y1="2" x2="8"  y2="6"/>
          <line x1="3"  y1="10" x2="21" y2="10"/>
          <path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/>
        </svg>
      </div>
      <h1>Months <span>→</span> Years</h1>
      <p>Time unit converter</p>
    </header>

    <!-- Input -->
    <div class="input-group">
      <label class="input-label" for="monthsInput">Enter number of months</label>
      <div class="input-wrap">
        <input
          type="number"
          id="monthsInput"
          placeholder="0"
          min="0"
          step="1"
          inputmode="decimal"
          autocomplete="off"
          aria-label="Number of months"
        />
        <span class="input-unit">mo</span>
      </div>
      <div class="stepper" role="group" aria-label="Quick presets">
        <button onclick="setMonths(6)"  aria-label="Set 6 months">6 mo</button>
        <button onclick="setMonths(12)" aria-label="Set 1 year">1 yr</button>
        <button onclick="setMonths(18)" aria-label="Set 18 months">18 mo</button>
        <button onclick="setMonths(24)" aria-label="Set 2 years">2 yr</button>
        <button onclick="setMonths(60)" aria-label="Set 5 years">5 yr</button>
      </div>
    </div>

    <!-- Convert Button -->
    <button class="btn-convert" id="convertBtn" onclick="convert()" aria-label="Convert months to years">
      Convert
    </button>

    <!-- Results -->
    <section id="resultsSection" class="results" aria-live="polite" aria-label="Conversion results">

      <!-- Primary: Years (exact) -->
      <div class="result-card primary" id="cardYears">
        <div class="result-value" id="valYears">—</div>
        <div class="result-label">Years</div>
      </div>

      <!-- Decades -->
      <div class="result-card" id="cardDecades">
        <div class="result-value" id="valDecades">—</div>
        <div class="result-label">Decades</div>
      </div>

      <!-- Weeks -->
      <div class="result-card" id="cardWeeks">
        <div class="result-value" id="valWeeks">—</div>
        <div class="result-label">Weeks</div>
      </div>

      <!-- Days -->
      <div class="result-card" id="cardDays">
        <div class="result-value" id="valDays">—</div>
        <div class="result-label">Days</div>
      </div>

      <!-- Hours -->
      <div class="result-card" id="cardHours">
        <div class="result-value" id="valHours">—</div>
        <div class="result-label">Hours</div>
      </div>

    </section>

    <!-- Breakdown -->
    <section id="breakdownSection" class="breakdown" aria-label="Detailed breakdown">
      <p class="breakdown-title">Breakdown</p>
      <div class="breakdown-row">
        <span class="breakdown-key">Complete years</span>
        <span class="breakdown-val" id="bdYears">—</span>
      </div>
      <div class="breakdown-row">
        <span class="breakdown-key">Remaining months</span>
        <span class="breakdown-val" id="bdMonths">—</span>
      </div>
      <div class="breakdown-row">
        <span class="breakdown-key">In days (avg)</span>
        <span class="breakdown-val" id="bdDays">—</span>
      </div>
      <div class="breakdown-row">
        <span class="breakdown-key">In hours (avg)</span>
        <span class="breakdown-val" id="bdHours">—</span>
      </div>
    </section>

    <!-- Reset -->
    <div id="resetWrap" class="reset-wrap">
      <button class="btn-reset" onclick="resetAll()" aria-label="Reset calculator">
        ↺ Reset
      </button>
    </div>

  </main>

  <!-- Install Banner -->
  <div class="install-banner" id="installBanner" role="dialog" aria-label="Install app prompt">
    <p><strong>Install the app</strong><br/>Add to your home screen for offline access.</p>
    <div class="install-banner-btns">
      <button class="btn-install"  id="btnInstall"  onclick="installApp()">Install</button>
      <button class="btn-dismiss"  id="btnDismiss"  onclick="dismissInstall()">Later</button>
    </div>
  </div>

  <script>
    // ── Constants ──
    const AVG_DAYS_PER_MONTH  = 30.436875;
    const HOURS_PER_DAY       = 24;
    const DAYS_PER_WEEK       = 7;

    // ── DOM refs ──
    const input          = document.getElementById('monthsInput');
    const resultsSection = document.getElementById('resultsSection');
    const breakdownSec   = document.getElementById('breakdownSection');
    const resetWrap      = document.getElementById('resetWrap');

    // ── Helpers ──
    function fmt(n, decimals = 2) {
      if (!isFinite(n)) return '—';
      const fixed = n.toFixed(decimals);
      // Split integer and decimal part for styling
      const [int, dec] = fixed.split('.');
      return dec && dec !== '00'
        ? `${Number(int).toLocaleString()}<span class="decimal">.${dec}</span>`
        : Number(int).toLocaleString();
    }

    function setVal(id, html) {
      document.getElementById(id).innerHTML = html;
    }

    function setMonths(n) {
      input.value = n;
      convert();
    }

    // ── Core Conversion ──
    function convert() {
      const raw = parseFloat(input.value);
      if (isNaN(raw) || raw < 0) {
        input.focus();
        return;
      }
      const months = raw;

      const years   = months / 12;
      const decades = months / 120;
      const days    = months * AVG_DAYS_PER_MONTH;
      const weeks   = days / DAYS_PER_WEEK;
      const hours   = days * HOURS_PER_DAY;

      // Breakdown
      const fullYears  = Math.floor(months / 12);
      const remMonths  = Math.round(months % 12 * 10) / 10;

      // Populate values
      setVal('valYears',   fmt(years, 4));
      setVal('valDecades', fmt(decades, 4));
      setVal('valWeeks',   fmt(weeks, 1));
      setVal('valDays',    fmt(days, 0));
      setVal('valHours',   fmt(hours, 0));

      setVal('bdYears',   `${fullYears} yr`);
      setVal('bdMonths',  `${remMonths} mo`);
      setVal('bdDays',    `${Math.round(days).toLocaleString()} days`);
      setVal('bdHours',   `${Math.round(hours).toLocaleString()} hrs`);

      // Show sections
      resultsSection.classList.add('visible');
      breakdownSec.classList.add('visible');
      resetWrap.classList.add('visible');
    }

    // ── Reset ──
    function resetAll() {
      input.value = '';
      ['valYears','valDecades','valWeeks','valDays','valHours',
       'bdYears','bdMonths','bdDays','bdHours'].forEach(id => {
        document.getElementById(id).innerHTML = '—';
      });
      resultsSection.classList.remove('visible');
      breakdownSec.classList.remove('visible');
      resetWrap.classList.remove('visible');
      input.focus();
    }

    // ── Live conversion on input ──
    input.addEventListener('input', () => {
      if (input.value !== '') convert();
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') convert();
    });

    // ── Offline Detection ──
    const banner = document.getElementById('offlineBanner');
    function updateOnlineStatus() {
      banner.classList.toggle('show', !navigator.onLine);
    }
    window.addEventListener('online',  updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();

    // ── Install Prompt ──
    let deferredPrompt = null;
    const installBanner = document.getElementById('installBanner');

    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      setTimeout(() => installBanner.classList.add('show'), 3000);
    });

    function installApp() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        installBanner.classList.remove('show');
      });
    }

    function dismissInstall() {
      installBanner.classList.remove('show');
    }

    window.addEventListener('appinstalled', () => {
      installBanner.classList.remove('show');
    });

    // ── Service Worker Registration ──
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[SW] Registered, scope:', reg.scope))
          .catch(err => console.warn('[SW] Registration failed:', err));
      });
    }
  </script>

</body>
</html>
